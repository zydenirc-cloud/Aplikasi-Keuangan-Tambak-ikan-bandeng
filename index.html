<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KetapangFinance - Transaksi</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    borderRadius: { '2xl': '1rem', '3xl': '1.5rem' },
                    colors: {
                        dark: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            text: '#f8fafc'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
        
        .skeleton {
            background: linear-gradient(90deg, #e2e8f0 25%, #f8fafc 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        .dark .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .glass {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .modal-zoom {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scale(0.95);
            opacity: 0;
        }
        .modal-active .modal-zoom {
            transform: scale(1);
            opacity: 1;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-dark-bg text-slate-900 dark:text-dark-text transition-colors duration-300 min-h-screen">

    <!-- Toast Notification -->
    <div id="toast-container" class="fixed top-5 right-5 z-[100] space-y-3 pointer-events-none"></div>

    <!-- Navigation -->
    <nav class="sticky top-0 z-40 w-full bg-white/80 dark:bg-dark-card/80 glass border-b border-slate-200 dark:border-slate-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                        <i data-lucide="waves"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400">
                        KetapangFinance
                    </span>
                </div>

                <div class="flex items-center gap-2 sm:gap-3">
                    <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-full text-xs font-semibold border border-green-200 dark:border-green-800/50">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        Terhubung
                    </div>
                    <button onclick="refreshData()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-transform active:scale-95 text-slate-600 dark:text-slate-300" title="Refresh Data">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                    </button>
                    <button onclick="toggleDarkMode()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl text-slate-600 dark:text-slate-300" title="Dark Mode">
                        <i id="theme-icon" data-lucide="moon" class="w-5 h-5"></i>
                    </button>
                    <button onclick="openSettingsModal()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl text-slate-600 dark:text-slate-300" title="Pengaturan API">
                        <i data-lucide="settings" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 animate-slide-up">
        
        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="relative overflow-hidden bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-6 text-white shadow-xl shadow-blue-500/20 group hover:-translate-y-1 transition-transform">
                <div class="absolute -right-4 -top-4 p-4 opacity-20 group-hover:scale-110 transition-transform">
                    <i data-lucide="wallet" class="w-32 h-32"></i>
                </div>
                <p class="text-blue-100 text-sm font-medium mb-1">Saldo Usaha</p>
                <h2 id="summary-saldo" class="text-3xl font-bold tracking-tight">Rp 0</h2>
            </div>
            <div class="bg-white dark:bg-dark-card rounded-3xl p-6 border border-slate-200 dark:border-slate-700 flex items-center gap-4">
                <div class="w-14 h-14 bg-emerald-100 dark:bg-emerald-900/30 rounded-2xl flex items-center justify-center text-emerald-600 dark:text-emerald-400">
                    <i data-lucide="arrow-down-left" class="w-7 h-7"></i>
                </div>
                <div>
                    <p class="text-slate-500 dark:text-slate-400 text-sm font-medium mb-1">Pemasukan</p>
                    <h3 id="summary-in" class="text-xl font-bold text-emerald-600 dark:text-emerald-400">Rp 0</h3>
                </div>
            </div>
            <div class="bg-white dark:bg-dark-card rounded-3xl p-6 border border-slate-200 dark:border-slate-700 flex items-center gap-4">
                <div class="w-14 h-14 bg-rose-100 dark:bg-rose-900/30 rounded-2xl flex items-center justify-center text-rose-600 dark:text-rose-400">
                    <i data-lucide="arrow-up-right" class="w-7 h-7"></i>
                </div>
                <div>
                    <p class="text-slate-500 dark:text-slate-400 text-sm font-medium mb-1">Pengeluaran</p>
                    <h3 id="summary-out" class="text-xl font-bold text-rose-600 dark:text-rose-400">Rp 0</h3>
                </div>
            </div>
        </div>

        <!-- Full Width Layout: Data Table -->
        <div class="bg-white dark:bg-dark-card rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden flex flex-col">
            <div class="p-5 border-b border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/30 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <h3 class="font-bold text-lg flex items-center gap-2">
                    <i data-lucide="list" class="w-5 h-5 text-slate-500"></i>
                    Riwayat Transaksi
                </h3>
                <div class="flex flex-col sm:flex-row items-center gap-3 w-full sm:w-auto">
                    <div class="relative w-full sm:w-64">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="search-input" placeholder="Cari keterangan / kategori..." class="pl-10 pr-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none w-full text-sm transition-all">
                    </div>
                    <button onclick="openTransactionModal()" class="w-full sm:w-auto flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-xl text-sm font-bold transition-all shadow-md active:scale-95 whitespace-nowrap">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        Tambah Baru
                    </button>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse whitespace-nowrap min-w-[700px]">
                    <thead>
                        <tr class="bg-slate-50 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-wider">
                            <th class="px-6 py-4">Tanggal</th>
                            <th class="px-6 py-4">Detail & Kategori</th>
                            <th class="px-6 py-4 text-right">Nominal</th>
                            <th class="px-6 py-4 text-center">Bukti</th>
                            <th class="px-6 py-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100 dark:divide-slate-800/60">
                        <!-- Data injected here -->
                    </tbody>
                </table>
                
                <!-- Empty / Loading State -->
                <div id="table-state" class="p-10 text-center text-slate-400 flex flex-col items-center justify-center">
                    <div class="skeleton h-12 w-full max-w-2xl rounded-xl mb-2 opacity-50"></div>
                    <div class="skeleton h-12 w-full max-w-2xl rounded-xl mb-2 opacity-30"></div>
                    <div class="skeleton h-12 w-full max-w-2xl rounded-xl opacity-10"></div>
                </div>
            </div>
        </div>

    </main>

    <!-- Modal Form Transaksi -->
    <div id="transaction-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-dark-card w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden modal-zoom flex flex-col max-h-[90vh]">
            <div class="px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50 shrink-0">
                <h3 class="font-bold text-lg flex items-center gap-2" id="form-title">
                    <i data-lucide="plus-circle" class="w-5 h-5 text-blue-600"></i>
                    Catat Transaksi
                </h3>
                <button type="button" onclick="closeTransactionModal()" class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition-colors text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="overflow-y-auto p-6 flex-1 custom-scrollbar">
                <form id="transaction-form" class="space-y-5">
                    <input type="hidden" id="form-id">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5">Tanggal</label>
                            <input type="date" id="form-tanggal" required class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5">Jenis</label>
                            <select id="form-jenis" required class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium transition-all">
                                <option value="Pemasukan">Pemasukan</option>
                                <option value="Pengeluaran" selected>Pengeluaran</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5">Kategori</label>
                        <select id="form-kategori" required class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium transition-all">
                            <!-- Options populated by JS -->
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5">Keterangan</label>
                        <input type="text" id="form-keterangan" placeholder="Contoh: Beli pakan 10 karung..." required class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm transition-all">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5">Nominal (Rp)</label>
                            <input type="text" id="form-nominal" placeholder="Rp 0" required class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-bold transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5">Metode</label>
                            <select id="form-metode" class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium transition-all">
                                <option value="Tunai">Tunai</option>
                                <option value="Transfer">Transfer</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5">Bukti (Max 5 file)</label>
                        <input type="file" id="form-file" multiple accept="image/*,application/pdf" class="w-full text-sm text-slate-500 file:mr-3 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-all bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-1.5">
                    </div>

                    <button type="submit" id="submit-btn" class="w-full py-3.5 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-500/30 hover:bg-blue-700 hover:-translate-y-0.5 active:translate-y-0 transition-all flex items-center justify-center gap-2 mt-4">
                        <i data-lucide="save" class="w-5 h-5"></i>
                        <span id="btn-text">Simpan Transaksi</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Settings -->
    <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-dark-card w-full max-w-md rounded-3xl shadow-2xl overflow-hidden modal-zoom">
            <div class="px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50">
                <h3 class="font-bold flex items-center gap-2">
                    <i data-lucide="link" class="w-5 h-5 text-blue-600"></i>
                    Konfigurasi Sistem
                </h3>
                <button onclick="closeSettingsModal()" class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Google Apps Script URL (API)</label>
                    <input type="password" id="api-url-input" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all font-mono text-sm" placeholder="https://script.google.com/macros/s/...">
                    <p class="text-xs text-slate-500 mt-2 flex items-center gap-1">
                        <i data-lucide="info" class="w-3.5 h-3.5"></i>
                        URL tersimpan aman di browser Anda (lokal).
                    </p>
                </div>
                <button onclick="saveSettings()" class="w-full py-3 bg-slate-900 dark:bg-blue-600 text-white rounded-xl font-bold hover:opacity-90 transition-all shadow-md active:scale-95">
                    Simpan Konfigurasi
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Configuration & State ---
        let API_URL = localStorage.getItem('API_URL') || '';
        let appData = { summary: {}, transactions: [] };
        let isDarkMode = localStorage.getItem('darkMode') === 'true';

        const KATEGORI_OPTIONS = {
            Pemasukan: ['Penjualan', 'Panen', 'Lainnya'],
            Pengeluaran: ['Pakan', 'Bibit', 'Obat', 'Perawatan', 'Listrik', 'Lainnya']
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            initIcons();
            initTheme();
            initFormDinamis();
            initNominalFormat();
            
            // Set default date to today
            document.getElementById('form-tanggal').valueAsDate = new Date();

            // Search filter event
            document.getElementById('search-input').addEventListener('input', (e) => renderTable(e.target.value));

            if (API_URL) {
                document.getElementById('api-url-input').value = API_URL;
                fetchData();
            } else {
                openSettingsModal();
                showToast("Sistem", "Harap masukkan URL API backend terlebih dahulu.", "warning");
            }
        });

        function initIcons() {
            lucide.createIcons();
        }

        function initTheme() {
            if (isDarkMode || (!('darkMode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                isDarkMode = true;
            } else {
                document.documentElement.classList.remove('dark');
                isDarkMode = false;
            }
            updateThemeIcon();
        }

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', isDarkMode);
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('theme-icon');
            icon.setAttribute('data-lucide', isDarkMode ? 'sun' : 'moon');
            initIcons();
        }

        // --- Form Dinamis Logic ---
        function initFormDinamis() {
            const jenisSelect = document.getElementById('form-jenis');
            jenisSelect.addEventListener('change', updateKategoriDropdown);
            updateKategoriDropdown(); // Call once on init
        }

        function updateKategoriDropdown() {
            const jenis = document.getElementById('form-jenis').value;
            const kategoriSelect = document.getElementById('form-kategori');
            const options = KATEGORI_OPTIONS[jenis] || [];
            
            kategoriSelect.innerHTML = options.map(opt => `<option value="${opt}">${opt}</option>`).join('');
        }

        function initNominalFormat() {
            const nominalInput = document.getElementById('form-nominal');
            nominalInput.addEventListener('keyup', function(e) {
                this.value = formatRupiahInput(this.value);
            });
        }

        function formatRupiahInput(value) {
            let numberString = value.replace(/[^,\d]/g, '').toString();
            let split = numberString.split(',');
            let sisa = split[0].length % 3;
            let rupiah = split[0].substr(0, sisa);
            let ribuan = split[0].substr(sisa).match(/\d{3}/gi);

            if (ribuan) {
                let separator = sisa ? '.' : '';
                rupiah += separator + ribuan.join('.');
            }

            rupiah = split[1] != undefined ? rupiah + ',' + split[1] : rupiah;
            return rupiah ? 'Rp ' + rupiah : '';
        }

        // --- Data Fetching & Rendering ---
        async function fetchData() {
            if (!API_URL) return;
            showTableLoading();
            
            try {
                const response = await fetch(`${API_URL}?action=getData`);
                const result = await response.json();
                if (result.status === 'success') {
                    appData = result.data;
                    renderUI();
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                showToast("Error", "Gagal sinkronisasi data dengan server.", "error");
                document.getElementById('table-state').innerHTML = `<div class="text-rose-500 font-medium">Gagal memuat data. Periksa API Anda.</div>`;
                console.error(err);
            }
        }

        function showTableLoading() {
            document.getElementById('table-body').innerHTML = '';
            document.getElementById('table-state').classList.remove('hidden');
        }

        function renderUI() {
            // Update Summary
            document.getElementById('summary-saldo').innerText = formatIDR(appData.summary.saldo || 0);
            document.getElementById('summary-in').innerText = formatIDR(appData.summary.totalPemasukan || 0);
            document.getElementById('summary-out').innerText = formatIDR(appData.summary.totalPengeluaran || 0);

            // Render Table
            renderTable();
        }

        function renderTable(searchQuery = '') {
            const tbody = document.getElementById('table-body');
            const stateBox = document.getElementById('table-state');
            tbody.innerHTML = '';
            
            let filteredData = appData.transactions;
            
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                filteredData = filteredData.filter(item => 
                    (item.keterangan && item.keterangan.toLowerCase().includes(q)) || 
                    (item.kategori && item.kategori.toLowerCase().includes(q))
                );
            }

            if (filteredData.length === 0) {
                stateBox.classList.remove('hidden');
                stateBox.innerHTML = `<div class="text-slate-500 font-medium">Tidak ada transaksi ditemukan.</div>`;
                return;
            }

            stateBox.classList.add('hidden');

            filteredData.forEach(item => {
                const isInc = item.jenis === 'Pemasukan';
                const row = document.createElement('tr');
                row.className = "group hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors";
                
                // Parse bukti links if multiple (comma separated)
                let buktiHtml = '-';
                if (item.bukti) {
                    const links = item.bukti.split(',').map(l => l.trim()).filter(l => l);
                    if (links.length > 0) {
                        buktiHtml = `<a href="${links[0]}" target="_blank" class="p-2 text-blue-500 bg-blue-50 dark:bg-blue-900/30 hover:bg-blue-100 dark:hover:bg-blue-900/60 rounded-xl inline-flex items-center gap-1 text-xs font-bold transition-colors">
                            <i data-lucide="paperclip" class="w-3.5 h-3.5"></i> ${links.length > 1 ? `+${links.length - 1}` : 'File'}
                        </a>`;
                    }
                }

                row.innerHTML = `
                    <td class="px-6 py-4">
                        <p class="text-sm font-bold">${new Date(item.tanggal).toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'})}</p>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${isInc ? 'bg-emerald-100 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-400' : 'bg-rose-100 text-rose-600 dark:bg-rose-900/30 dark:text-rose-400'}">
                                <i data-lucide="${isInc ? 'arrow-down-left' : 'arrow-up-right'}" class="w-5 h-5"></i>
                            </div>
                            <div class="max-w-[200px] truncate">
                                <p class="text-sm font-bold text-slate-800 dark:text-slate-200 truncate" title="${item.keterangan || ''}">${item.keterangan || '-'}</p>
                                <p class="text-xs text-slate-500 truncate">${item.kategori}</p>
                                <span class="text-[10px] font-semibold px-2 py-0.5 rounded border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 mt-1 inline-block">${item.metode}</span>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <p class="font-bold ${isInc ? 'text-emerald-600 dark:text-emerald-400' : 'text-rose-600 dark:text-rose-400'}">
                            ${isInc ? '+' : '-'} ${formatIDR(item.nominal)}
                        </p>
                    </td>
                    <td class="px-6 py-4 text-center">
                        ${buktiHtml}
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex items-center justify-center gap-1">
                            <button onclick='editTransaction(${JSON.stringify(item)})' class="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-xl transition-colors" title="Edit">
                                <i data-lucide="edit-3" class="w-4 h-4"></i>
                            </button>
                            <button onclick="deleteTransaction('${item.id}')" class="p-2 text-slate-400 hover:text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-900/30 rounded-xl transition-colors" title="Hapus">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });

            initIcons();
        }

        // --- Core Actions ---
        async function handleFormSubmit(e) {
            e.preventDefault();
            const nominalRaw = document.getElementById('form-nominal').value;
            const nominalInput = parseFloat(nominalRaw.replace(/[^0-9]/g, ''));
            
            if (isNaN(nominalInput) || nominalInput <= 0) {
                showToast("Peringatan", "Nominal transaksi harus lebih dari 0.", "warning");
                return;
            }

            const fileInput = document.getElementById('form-file');
            if (fileInput.files.length > 5) {
                showToast("Peringatan", "Maksimal hanya 5 file bukti yang diizinkan.", "warning");
                return;
            }

            const btn = document.getElementById('submit-btn');
            const id = document.getElementById('form-id').value;
            const action = id ? 'updateData' : 'addData';
            
            setLoading(btn, true);

            const files = [];
            if (fileInput.files.length > 0) {
                for (let file of fileInput.files) {
                    const b64 = await toBase64(file);
                    files.push({ name: file.name, base64: b64 });
                }
            }

            const payload = {
                id: id || undefined,
                tanggal: document.getElementById('form-tanggal').value,
                jenis: document.getElementById('form-jenis').value,
                kategori: document.getElementById('form-kategori').value,
                keterangan: document.getElementById('form-keterangan').value,
                nominal: nominalInput,
                metode: document.getElementById('form-metode').value,
                files: files.length > 0 ? files : undefined
            };

            try {
                const response = await fetch(`${API_URL}?action=${action}`, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.status === 'success') {
                    showToast("Sukses", `Transaksi berhasil ${id ? 'diperbarui' : 'dicatat'}.`, "success");
                    closeTransactionModal();
                    fetchData(); // Refresh table
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                showToast("Error", "Gagal menyimpan data. Pastikan koneksi dan API URL benar.", "error");
            } finally {
                setLoading(btn, false);
            }
        }

        function openTransactionModal() {
            resetForm();
            document.getElementById('transaction-modal').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('transaction-modal').classList.add('opacity-100', 'modal-active');
            }, 10);
        }

        function closeTransactionModal() {
            document.getElementById('transaction-modal').classList.remove('opacity-100', 'modal-active');
            setTimeout(() => {
                document.getElementById('transaction-modal').classList.add('hidden');
            }, 300);
        }

        function editTransaction(item) {
            openTransactionModal();
            
            document.getElementById('form-title').innerHTML = `<i data-lucide="edit" class="w-5 h-5 text-amber-500"></i> Edit Transaksi`;
            document.getElementById('btn-text').innerText = "Update Transaksi";
            
            // Set Form Data
            document.getElementById('form-id').value = item.id;
            document.getElementById('form-tanggal').value = new Date(item.tanggal).toISOString().split('T')[0];
            document.getElementById('form-jenis').value = item.jenis;
            
            updateKategoriDropdown(); // Update options first based on jenis
            
            document.getElementById('form-kategori').value = item.kategori;
            document.getElementById('form-keterangan').value = item.keterangan;
            document.getElementById('form-nominal').value = formatRupiahInput(item.nominal.toString());
            document.getElementById('form-metode').value = item.metode;
            
            // File input can't be prefilled due to security, user must re-upload if they want to append files
            document.getElementById('form-file').value = ''; 
            
            initIcons();
        }

        async function deleteTransaction(id) {
            if (!confirm("Apakah Anda yakin ingin menghapus transaksi ini? Data tidak dapat dikembalikan.")) return;
            
            try {
                showToast("Proses", "Sedang menghapus...", "warning");
                const response = await fetch(`${API_URL}?action=deleteData`, {
                    method: 'POST',
                    body: JSON.stringify({ id })
                });
                const result = await response.json();
                if (result.status === 'success') {
                    showToast("Sukses", "Transaksi berhasil dihapus.", "success");
                    fetchData();
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                showToast("Error", "Gagal menghapus data.", "error");
            }
        }

        function resetForm() {
            document.getElementById('transaction-form').reset();
            document.getElementById('form-id').value = '';
            document.getElementById('form-tanggal').valueAsDate = new Date();
            document.getElementById('form-jenis').value = 'Pengeluaran';
            updateKategoriDropdown();

            // Reset UI states
            document.getElementById('form-title').innerHTML = `<i data-lucide="plus-circle" class="w-5 h-5 text-blue-600"></i> Catat Transaksi`;
            document.getElementById('btn-text').innerText = "Simpan Transaksi";
            initIcons();
        }

        // --- Utility / UI Helpers ---
        function formatIDR(num) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num);
        }

        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function refreshData() {
            fetchData();
        }

        function openSettingsModal() {
            document.getElementById('settings-modal').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('settings-modal').classList.add('opacity-100', 'modal-active');
            }, 10);
        }

        function closeSettingsModal() {
            document.getElementById('settings-modal').classList.remove('opacity-100', 'modal-active');
            setTimeout(() => {
                document.getElementById('settings-modal').classList.add('hidden');
            }, 300);
        }

        function saveSettings() {
            const url = document.getElementById('api-url-input').value.trim();
            if (!url) {
                showToast("Peringatan", "URL tidak boleh kosong.", "warning");
                return;
            }
            localStorage.setItem('API_URL', url);
            API_URL = url;
            closeSettingsModal();
            showToast("Sistem", "Konfigurasi API berhasil disimpan.", "success");
            fetchData();
        }

        function showToast(title, msg, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const color = type === 'success' ? 'bg-emerald-500' : (type === 'error' ? 'bg-rose-500' : 'bg-amber-500');
            
            toast.className = `flex items-center gap-3 p-4 min-w-[300px] bg-white dark:bg-dark-card border-l-4 ${type === 'success' ? 'border-emerald-500' : (type === 'error' ? 'border-rose-500' : 'border-amber-500')} shadow-2xl rounded-xl animate-slide-up pointer-events-auto`;
            toast.innerHTML = `
                <div class="w-8 h-8 ${color} rounded-full flex items-center justify-center text-white shrink-0">
                    <i data-lucide="${type === 'success' ? 'check' : (type === 'error' ? 'x' : 'alert-circle')}" class="w-4 h-4"></i>
                </div>
                <div>
                    <h5 class="text-sm font-bold">${title}</h5>
                    <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">${msg}</p>
                </div>
            `;
            container.appendChild(toast);
            initIcons();
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        function setLoading(btn, isLoading) {
            if (isLoading) {
                btn.disabled = true;
                btn.classList.add('opacity-75', 'cursor-not-allowed');
                btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Sedang Memproses...`;
            } else {
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                const isEdit = document.getElementById('form-id').value !== '';
                btn.innerHTML = `<i data-lucide="save" class="w-5 h-5"></i> <span id="btn-text">${isEdit ? 'Update Transaksi' : 'Simpan Transaksi'}</span>`;
            }
            initIcons();
        }

        // Attach event listener to form
        document.getElementById('transaction-form').addEventListener('submit', handleFormSubmit);
    </script>
</body>
</html>
